<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gasparilla — Kanban Board</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0d1117;--card:#161b22;--border:#30363d;
    --text:#c9d1d9;--muted:#8b949e;
    --blue:#58a6ff;--purple:#bc8cff;--green:#3fb950;
    --orange:#d29922;--red:#f85149;--teal:#39d2c0;--pink:#f778ba;--cyan:#76e3fc;
  }
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;padding:1rem 1.5rem}

  .header{text-align:center;margin-bottom:1rem}
  .header h1{font-size:1.5rem;color:var(--blue);margin-bottom:.25rem}
  .header p{color:var(--muted);font-size:.8rem}

  .stats{display:flex;justify-content:center;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.4rem .75rem;text-align:center;font-size:.7rem}
  .stat .num{font-size:1.1rem;font-weight:700}

  /* Kanban Board */
  .board-wrapper{overflow-x:auto;padding-bottom:1rem}
  .board{display:flex;gap:.75rem;min-width:1200px;align-items:flex-start}

  .column{flex:1;min-width:130px;min-height:300px}
  .col-header{display:flex;align-items:center;justify-content:space-between;padding:.5rem .6rem;border-radius:8px 8px 0 0;margin-bottom:.4rem}
  .col-header .label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
  .col-header .count{background:#21262d;border:1px solid var(--border);border-radius:12px;padding:.1rem .45rem;font-size:.7rem;color:var(--muted)}

  .col-body{background:#010409;border:1px solid var(--border);border-radius:0 0 8px 8px;min-height:120px;padding:.3rem}
  .col-body.drag-over{border-color:var(--blue);background:rgba(88,166,255,.04)}

  .card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.5rem .6rem;margin-bottom:.3rem;cursor:grab;transition:border-color .15s,box-shadow .15s;position:relative}
  .card:hover{border-color:var(--muted)}
  .card.selected{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
  .card.dragging{opacity:.4;transform:rotate(2deg)}

  .card .phase-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
  .card .phase-tag{font-size:.6rem;padding:.1rem .3rem;border-radius:3px;margin-right:.35rem;display:inline-block;vertical-align:middle;font-weight:600}
  .card .story-text{font-size:.78rem;line-height:1.3;display:inline;vertical-align:middle}
  .card .story-id{font-size:.65rem;color:var(--muted);margin-top:.25rem;display:block}

  /* Color coding by phase */
  .phase-1{background:#58a6ff;color:#000}
  .phase-2{background:#bc8cff;color:#000}
  .phase-3{background:#3fb950;color:#000}
  .phase-4{background:#d29922;color:#000}
  .phase-5{background:#f85149;color:#fff}
  .phase-6{background:#39d2c0;color:#000}
  .phase-7{background:#76e3fc;color:#000}
  .phase-8{background:#f778ba;color:#000}

  /* Column header colors */
  .col-0 .col-header{background:#21262d}
  .col-1 .col-header{background:rgba(88,166,255,.08)}
  .col-2 .col-header{background:rgba(210,153,34,.08)}
  .col-3 .col-header{background:rgba(188,140,255,.08)}
  .col-4 .col-header{background:rgba(188,140,255,.12)}
  .col-5 .col-header{background:rgba(118,227,252,.08)}
  .col-6 .col-header{background:rgba(63,185,80,.08)}
  .col-7 .col-header{background:rgba(46,160,67,.15)}

  /* Drop placeholder */
  .drop-indicator{height:3px;background:var(--blue);border-radius:2px;margin:4px 0;transition:opacity .15s}

  /* Search + filter row */
  .controls{display:flex;justify-content:center;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap}
  .filter-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:.25rem .65rem;border-radius:12px;cursor:pointer;font-size:.7rem}
  .filter-btn.active{border-color:var(--blue);color:var(--blue);background:rgba(88,166,255,.08)}
  .filter-btn:hover{border-color:var(--muted)}
  .search-input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:.25rem .65rem;border-radius:12px;font-size:.75rem;outline:none;width:200px}
  .search-input:focus{border-color:var(--blue)}
  .search-input::placeholder{color:var(--muted)}

  footer{text-align:center;color:var(--muted);font-size:.65rem;margin-top:1.5rem}
  footer a{color:var(--blue);text-decoration:none}

  /* Modal for reordering / edit */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;max-width:400px;width:90%}
  .modal h3{margin-bottom:.75rem;font-size:.9rem}
  .modal label{display:block;font-size:.75rem;margin-bottom:.25rem;color:var(--muted)}
  .modal select,.modal input{width:100%;padding:.4rem;border-radius:6px;border:1px solid var(--border);background:#0d1117;color:var(--text);font-size:.8rem;margin-bottom:.5rem;outline:none}
  .modal select:focus,.modal input:focus{border-color:var(--blue)}
  .modal-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:.5rem}
  .btn-cancel{background:var(--card);border:1px solid var(--border);color:var(--text);padding:.35rem .75rem;border-radius:6px;cursor:pointer;font-size:.78rem}
  .btn-save{background:var(--blue);border:none;color:#000;padding:.35rem .75rem;border-radius:6px;cursor:pointer;font-weight:600;font-size:.78rem}
  .btn-del{background:var(--red);border:none;color:#fff;padding:.35rem .75rem;border-radius:6px;cursor:pointer;font-size:.78rem}

  .add-card-btn{width:100%;padding:.3rem;border:1px dashed var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-size:.7rem;margin-top:.2rem}
  .add-card-btn:hover{border-color:var(--muted);color:var(--text)}
</style>
</head>
<body>

<div class="header">
  <h1>Gasparilla Shopify — Kanban</h1>
  <p>Drag cards between columns to move stories through the pipeline</p>
</div>

<div class="stats" id="stats"></div>

<div class="controls">
  <input type="text" class="search-input" id="search" placeholder="Search stories...">
  <button class="filter-btn active" data-phase="all">All Phases</button>
  <button class="filter-btn" data-phase="1">Foundation</button>
  <button class="filter-btn" data-phase="2">Waivers</button>
  <button class="filter-btn" data-phase="3">Billing</button>
  <button class="filter-btn" data-phase="4">Booking</button>
  <button class="filter-btn" data-phase="5">Access</button>
  <button class="filter-btn" data-phase="6">Marketing</button>
  <button class="filter-btn" data-phase="7">Dashboard</button>
  <button class="filter-btn" data-phase="8">PWA</button>
</div>

<div class="board-wrapper">
  <div class="board" id="board"></div>
</div>

<footer>Built with Hermes Agent · <a href="https://github.com/jsteve1/gasparilla-docs">Source</a></footer>

<!-- Edit / Add modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Edit Story</h3>
    <label>Story text</label>
    <input type="text" id="modal-text">
    <label>Phase</label>
    <select id="modal-phase">
      <option value="1">Foundation</option>
      <option value="2">Digital Waivers</option>
      <option value="3">Membership & Billing</option>
      <option value="4">Booking Engine</option>
      <option value="5">Access Control</option>
      <option value="6">Marketing & Retention</option>
      <option value="7">Dashboard & Analytics</option>
      <option value="8">Member App PWA</option>
    </select>
    <div class="modal-actions">
      <button class="btn-del" id="btn-del">Delete</button>
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-save" id="btn-save">Save</button>
    </div>
  </div>
</div>

<script>
const COLUMNS = ['New', 'Ready', 'In Development', 'PR Pushed', 'PR Reviewed', 'Merged to Dev', 'Merged to Staging', 'Live'];
const PHASES = [
  {num:1,label:'Foundation',color:'#58a6ff'},
  {num:2,label:'Waivers',color:'#bc8cff'},
  {num:3,label:'Billing',color:'#3fb950'},
  {num:4,label:'Booking',color:'#d29922'},
  {num:5,label:'Access Control',color:'#f85149'},
  {num:6,label:'Marketing',color:'#39d2c0'},
  {num:7,label:'Dashboard',color:'#76e3fc'},
  {num:8,label:'PWA',color:'#f778ba'}
];

const DEFAULT_STORIES = [
  // Phase 1: Foundation
  {text:'Project scaffold: Node 20 + Polaris UI Kit',phase:1,col:5},
  {text:'Shopify Partner dev store setup',phase:1,col:5},
  {text:'AWS account + IAM roles',phase:1,col:5},
  {text:'DynamoDB table definitions',phase:1,col:5},
  {text:'API Gateway + Lambda bootstrap',phase:1,col:5},
  {text:'GitHub repo + CI pipeline',phase:1,col:5},
  {text:'Dev environment documented (README)',phase:1,col:5},
  // Phase 2: Waivers
  {text:'Member sign-up form API routes (PR #22)',phase:2,col:5},
  {text:'Member sign-up form UI (Polaris) — backend done, UI pending',phase:2,col:2},
  {text:'Waiver template versioning system (PR #18, #21)',phase:2,col:5},
  {text:'Signature field management per template (PR #21 — 2.9)',phase:2,col:5},
  {text:'Digital signature capture + S3 storage (PR #16, #18)',phase:2,col:5},
  {text:'HMAC verification + IP logging (PR #23, fix Jun 9)',phase:2,col:5},
  {text:'Legal text management panel — backend done, admin UI pending',phase:2,col:2},
  {text:'Age-gated minor waivers / guardian signature (PR #26 — 2.4)',phase:2,col:5},
  {text:'Versioned terms with forced re-acceptance (PR #25 — 2.5)',phase:2,col:5},
  {text:'Waiver compliance dashboard (PR #24, #25 — 2.7)',phase:2,col:5},
  {text:'Webhook: new-member → DynamoDB sync (PR #23 — 2.6)',phase:2,col:5},
  {text:'Waiver PDF composition service (issue #19 — 2.8)',phase:2,col:0},
  {text:'shop_id auth validation in settingsService (issue #27)',phase:2,col:0},
  // Phase 3: Billing
  {text:'Membership tier CRUD (Starter/Pro/Enterprise)',phase:3,col:0},
  {text:'Recurring billing via Shopify Subscriptions',phase:3,col:0},
  {text:'Proration on mid-cycle upgrades',phase:3,col:0},
  {text:'Failed payment retry (dunning)',phase:3,col:0},
  {text:'Billing history UI',phase:3,col:0},
  {text:'Auto-balance blocking on unpaid',phase:3,col:0},
  {text:'Stripe webhook → member status sync',phase:3,col:0},
  {text:'CSV export for accounting',phase:3,col:0},
  // Phase 4: Booking
  {text:'Resource creation (classes, trainers, rooms)',phase:4,col:0},
  {text:'Schedule builder UI',phase:4,col:0},
  {text:'Member booking with capacity',phase:4,col:0},
  {text:'Waitlist system',phase:4,col:0},
  {text:'Auto-check-in + visit credit',phase:4,col:0},
  {text:'No-show detection + refund',phase:4,col:0},
  // Phase 5: Access Control
  {text:'Access decision Lambda service',phase:5,col:0},
  {text:'Door + rule config in Polaris',phase:5,col:0},
  {text:'BLE token issuance',phase:5,col:0},
  {text:'Key fob assignment',phase:5,col:0},
  {text:'QR code dynamic check-in',phase:5,col:0},
  {text:'Passcode access system',phase:5,col:0},
  {text:'Nuki/Salto lock integration',phase:5,col:0},
  // Phase 6: Marketing
  {text:'Member segmentation engine',phase:6,col:0},
  {text:'Automated campaign builder',phase:6,col:0},
  {text:'At-risk detection trigger',phase:6,col:0},
  {text:'Email + SMS (SendGrid/Twilio)',phase:6,col:0},
  {text:'Push notifications (PWA)',phase:6,col:0},
  {text:'Referral system + rewards',phase:6,col:0},
  // Phase 7: Dashboard
  {text:'KPI aggregation Lambdas',phase:7,col:0},
  {text:'Dashboard widgets (visits, revenue)',phase:7,col:0},
  {text:'Custom report builder',phase:7,col:0},
  {text:'Real-time visitor board',phase:7,col:0},
  {text:'CSV export for accounting',phase:7,col:0},
  // Phase 8: PWA
  {text:'Shopify Polaris PWA scaffold',phase:8,col:0},
  {text:'Member profile dashboard',phase:8,col:0},
  {text:'Booking calendar in app',phase:8,col:0},
  {text:'Progress / measurement tracking',phase:8,col:0},
  {text:'Workout viewer for PT clients',phase:8,col:0},
  {text:'Push notifications in PWA',phase:8,col:0},
];

const STORAGE_KEY = 'gasparilla-kanban-v3';
let stories = [];
let searchFilter = '';
let phaseFilter = 'all';
let editingId = null;
let nextId = 100;

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (d && Array.isArray(d)) { stories = d; nextId = Math.max(0, ...stories.map(s=>s.id))+1; return; }
  } catch(e) {}
  stories = DEFAULT_STORIES.map(s => ({id: nextId++, ...s}));
  save();
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(stories)); }

function filtered() {
  return stories.filter(s => {
    if (phaseFilter !== 'all' && s.phase !== parseInt(phaseFilter)) return false;
    if (searchFilter && !s.text.toLowerCase().includes(searchFilter)) return false;
    return true;
  });
}

function getPhase(ph) { return PHASES[ph - 1] || PHASES[0]; }

function render() {
  const board = document.getElementById('board');
  const stats = document.getElementById('stats');
  const vis = filtered();
  const colCounts = COLUMNS.map((_, c) => vis.filter(s => s.col === c).length);
  const liveCount = colCounts[7];

  stats.innerHTML =
    '<div class="stat"><div class="num" style="color:var(--blue)">'+vis.length+'</div>Total</div>' +
    '<div class="stat"><div class="num" style="color:var(--orange)">'+(colCounts[2]+colCounts[3]+colCounts[4])+'</div>In Flight</div>' +
    '<div class="stat"><div class="num" style="color:var(--green)">'+liveCount+'</div>Live</div>' +
    '<div class="stat"><div class="num" style="color:var(--purple)">'+Math.round(liveCount/vis.length*100||0)+'%</div>Deployed</div>';

  board.innerHTML = COLUMNS.map((colName, cIdx) => {
    const cards = vis.filter(s => s.col === cIdx);
    const cardsHtml = cards.map(s => {
      const ph = getPhase(s.phase);
      return '<div class="card" draggable="true" data-id="'+s.id+'" data-col="'+s.col+'" ' +
        'ondragstart="dragStart(event)" ondblclick="openEdit('+s.id+')">' +
        '<span class="phase-tag phase-'+s.phase+'">'+ph.label+'</span>' +
        '<span class="story-text">'+esc(s.text)+'</span></div>';
    }).join('');

    return '<div class="column col-'+cIdx+'">' +
      '<div class="col-header"><span class="label">'+colName+'</span><span class="count">'+cards.length+'</span></div>' +
      '<div class="col-body" data-col="'+cIdx+'" ' +
        'ondragover="dragOver(event)" ondrop="drop(event)">'+cardsHtml+'</div>' +
      '<button class="add-card-btn" onclick="openAdd('+cIdx+')">+ Add story</button></div>';
  }).join('');
}

function esc(s) { var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* Drag and drop */
let dragId = null, dragFrom = null;

function dragStart(e) {
  dragId = parseInt(e.target.dataset.id);
  dragFrom = parseInt(e.target.dataset.col);
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
  setTimeout(() => e.currentTarget.classList.remove('drag-over'), 200);
}

function drop(e) {
  e.preventDefault();
  const newCol = parseInt(e.currentTarget.dataset.col);
  const story = stories.find(s => s.id === dragId);
  if (story) { story.col = newCol; save(); render(); }
  dragId = null; dragFrom = null;
}

document.addEventListener('dragend', () => {
  if (dragId) {
    document.querySelectorAll('.card.dragging').forEach(e => e.classList.remove('dragging'));
  }
  dragId = null; dragFrom = null;
});

/* Modal */
const overlay = document.getElementById('modal');

function openEdit(id) {
  editingId = id;
  const s = stories.find(x => x.id === id);
  document.getElementById('modal-title').textContent = 'Edit Story';
  document.getElementById('modal-text').value = s.text;
  document.getElementById('modal-phase').value = s.phase;
  document.getElementById('btn-del').style.display = '';
  overlay.classList.add('open');
}

function openAdd(defaultCol) {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add Story';
  document.getElementById('modal-text').value = '';
  document.getElementById('modal-phase').value = '1';
  document.getElementById('btn-del').style.display = 'none';
  overlay.classList.add('open');
  // store default col
  overlay.dataset.defaultCol = defaultCol;
}

document.getElementById('btn-cancel').onclick = () => overlay.classList.remove('open');
overlay.onclick = (e) => { if(e.target===overlay) overlay.classList.remove('open'); };

document.getElementById('btn-save').onclick = () => {
  const text = document.getElementById('modal-text').value.trim();
  const phase = parseInt(document.getElementById('modal-phase').value);
  if (!text) return;

  if (editingId !== null) {
    const s = stories.find(x => x.id === editingId);
    s.text = text; s.phase = phase;
  } else {
    stories.push({id: nextId++, text, phase, col: parseInt(overlay.dataset.defaultCol) || 0});
  }
  save(); render(); overlay.classList.remove('open');
};

document.getElementById('btn-del').onclick = () => {
  if (editingId === null) return;
  stories = stories.filter(s => s.id !== editingId);
  save(); render(); overlay.classList.remove('open');
};

/* Filters */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelector('.filter-btn.active').classList.remove('active');
    btn.classList.add('active');
    phaseFilter = btn.dataset.phase;
    render();
  };
});

document.getElementById('search').oninput = (e) => {
  searchFilter = e.target.value.toLowerCase();
  render();
};

load();
render();
</script>
</body>
</html>
