<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gasparilla — Live Agent Board</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0d1117;--card:#161b22;--border:#30363d;
    --text:#c9d1d9;--muted:#8b949e;
    --blue:#58a6ff;--green:#3fb950;--orange:#d29922;
    --red:#f85149;--purple:#bc8cff;--teal:#39d2c0;
  }
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;min-height:100vh}

  /* ── Gate overlay ──────────────────────────────────── */
  #gate{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:999;gap:1rem
  }
  #gate h2{font-size:1.3rem;color:var(--blue)}
  #gate p{color:var(--muted);font-size:.85rem;text-align:center;max-width:320px}
  #gate input{
    background:var(--card);border:1px solid var(--border);color:var(--text);
    padding:.5rem 1rem;border-radius:8px;font-size:.95rem;width:280px;outline:none
  }
  #gate input:focus{border-color:var(--blue)}
  #gate button{
    background:var(--blue);color:#000;border:none;padding:.5rem 1.5rem;
    border-radius:8px;font-weight:700;font-size:.9rem;cursor:pointer;width:280px
  }
  #gate .err{color:var(--red);font-size:.8rem;min-height:1.2em}

  /* ── Main layout ────────────────────────────────────── */
  #app{display:none;padding:1rem 1.5rem}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
  .header h1{font-size:1.4rem;color:var(--blue)}
  .header-right{display:flex;align-items:center;gap:.75rem}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .last-updated{color:var(--muted);font-size:.72rem}
  .btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);
    padding:.25rem .6rem;border-radius:6px;cursor:pointer;font-size:.72rem}
  .btn-logout:hover{border-color:var(--red);color:var(--red)}

  /* ── Stats bar ──────────────────────────────────────── */
  .stats{display:flex;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:6px;
    padding:.35rem .7rem;text-align:center;font-size:.7rem}
  .stat .num{font-size:1rem;font-weight:700}

  /* ── Board ──────────────────────────────────────────── */
  .board-wrap{overflow-x:auto;padding-bottom:1rem}
  .board{display:flex;gap:.75rem;min-width:900px;align-items:flex-start}

  .col{flex:1;min-width:130px}
  .col-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:.45rem .6rem;border-radius:8px 8px 0 0;margin-bottom:.35rem
  }
  .col-head .label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .col-head .cnt{background:#21262d;border:1px solid var(--border);
    border-radius:12px;padding:.1rem .45rem;font-size:.68rem;color:var(--muted)}
  .col-body{background:#010409;border:1px solid var(--border);border-radius:0 0 8px 8px;min-height:100px;padding:.3rem}

  /* Column accent colors */
  .col-triage  .col-head{background:rgba(139,148,158,.08)}
  .col-todo    .col-head{background:rgba(88,166,255,.06)}
  .col-ready   .col-head{background:rgba(210,153,34,.08)}
  .col-running .col-head{background:rgba(88,166,255,.12);border-bottom:2px solid var(--blue)}
  .col-blocked .col-head{background:rgba(248,81,73,.1);border-bottom:2px solid var(--red)}
  .col-done    .col-head{background:rgba(63,185,80,.08)}

  /* Cards */
  .card{
    background:var(--card);border:1px solid var(--border);border-radius:6px;
    padding:.45rem .55rem;margin-bottom:.3rem;font-size:.78rem;line-height:1.35
  }
  .card.status-running{border-left:3px solid var(--blue)}
  .card.status-blocked{border-left:3px solid var(--red)}
  .card.status-done   {border-left:3px solid var(--green);opacity:.75}

  .card .title{color:var(--text)}
  .card .meta{color:var(--muted);font-size:.68rem;margin-top:.3rem;display:flex;gap:.5rem;flex-wrap:wrap}
  .badge{border-radius:3px;padding:.1rem .3rem;font-size:.6rem;font-weight:600}
  .badge-assignee{background:rgba(88,166,255,.12);color:var(--blue)}
  .badge-failures{background:rgba(248,81,73,.12);color:var(--red)}
  .badge-tenant{background:rgba(188,140,255,.12);color:var(--purple)}

  .card .summary{color:var(--muted);font-size:.68rem;margin-top:.25rem;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

  /* Error banner */
  #error-banner{
    display:none;background:rgba(248,81,73,.1);border:1px solid var(--red);
    color:var(--red);padding:.4rem .8rem;border-radius:6px;font-size:.8rem;
    margin-bottom:.75rem
  }

  footer{text-align:center;color:var(--muted);font-size:.65rem;margin-top:1.5rem}
  footer a{color:var(--blue);text-decoration:none}
</style>
</head>
<body>

<!-- Passcode gate -->
<div id="gate">
  <h2>Gasparilla Agent Board</h2>
  <p>Enter the board access token to view live agent activity.</p>
  <input id="pw" type="password" placeholder="Access token" autocomplete="off">
  <button id="btn-enter">Access Board</button>
  <div class="err" id="gate-err"></div>
</div>

<!-- Board -->
<div id="app">
  <div class="header">
    <h1>Gasparilla — Live Agent Board</h1>
    <div class="header-right">
      <div class="pulse" id="pulse" title="Live"></div>
      <span class="last-updated" id="last-updated">connecting…</span>
      <button class="btn-logout" id="btn-logout">Sign out</button>
    </div>
  </div>
  <div id="error-banner"></div>
  <div class="stats" id="stats"></div>
  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>
  <footer>Live data from <a href="https://kanban.gaspartech.com/health" target="_blank">kanban.gaspartech.com</a> · <a href="https://github.com/jsteve1/gasparilla-docs">Source</a></footer>
</div>

<script>
const API = 'https://kanban.gaspartech.com';
const STORAGE_KEY = 'gasparilla_kanban_token';
const POLL_MS = 3000;

const STATUS_COLS = [
  { id: 'triage',  label: 'Triage',  class: 'col-triage'  },
  { id: 'todo',    label: 'To Do',   class: 'col-todo'    },
  { id: 'ready',   label: 'Ready',   class: 'col-ready'   },
  { id: 'running', label: 'Running', class: 'col-running' },
  { id: 'blocked', label: 'Blocked', class: 'col-blocked' },
  { id: 'done',    label: 'Done',    class: 'col-done'    },
];

let token = localStorage.getItem(STORAGE_KEY) || '';
let lastEventId = 0;
let pollTimer = null;

// ── Gate ───────────────────────────────────────────────

function showGate(msg) {
  document.getElementById('app').style.display = 'none';
  document.getElementById('gate').style.display = 'flex';
  if (msg) document.getElementById('gate-err').textContent = msg;
}

function hideGate() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

document.getElementById('btn-enter').onclick = async () => {
  const val = document.getElementById('pw').value.trim();
  if (!val) return;
  document.getElementById('gate-err').textContent = '';
  document.getElementById('btn-enter').textContent = 'Verifying…';
  const ok = await tryToken(val);
  document.getElementById('btn-enter').textContent = 'Access Board';
  if (ok) {
    token = val;
    localStorage.setItem(STORAGE_KEY, token);
    hideGate();
    startPolling();
  } else {
    showGate('Invalid token.');
  }
};
document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-enter').click();
});

document.getElementById('btn-logout').onclick = () => {
  clearInterval(pollTimer);
  localStorage.removeItem(STORAGE_KEY);
  token = '';
  showGate();
};

// ── API ────────────────────────────────────────────────

async function apiFetch(path) {
  const res = await fetch(API + path, {
    headers: { Authorization: 'Bearer ' + token }
  });
  return res;
}

async function tryToken(t) {
  try {
    const res = await fetch(API + '/board', {
      headers: { Authorization: 'Bearer ' + t }
    });
    return res.ok;
  } catch { return false; }
}

async function fetchBoard() {
  try {
    const res = await apiFetch('/board');
    if (res.status === 401) { showGate('Session expired.'); return; }
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    renderBoard(data.board);
    document.getElementById('error-banner').style.display = 'none';
    document.getElementById('pulse').style.background = 'var(--green)';
    document.getElementById('last-updated').textContent =
      'updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('pulse').style.background = 'var(--red)';
    const b = document.getElementById('error-banner');
    b.textContent = 'Failed to reach kanban.gaspartech.com — retrying…';
    b.style.display = 'block';
  }
}

async function pollEvents() {
  try {
    const res = await apiFetch('/events?since=' + lastEventId);
    if (res.status === 401) { showGate('Session expired.'); return; }
    if (!res.ok) return;
    const data = await res.json();
    if (data.events && data.events.length > 0) {
      lastEventId = data.events[data.events.length - 1].id;
      await fetchBoard();
    }
  } catch { /* will retry */ }
}

function startPolling() {
  fetchBoard();
  pollTimer = setInterval(pollEvents, POLL_MS);
}

// ── Render ─────────────────────────────────────────────

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderBoard(board) {
  const boardEl = document.getElementById('board');
  const statsEl = document.getElementById('stats');

  let totalTasks = 0, running = 0, blocked = 0, done = 0;

  // Build columns
  boardEl.innerHTML = STATUS_COLS.map(col => {
    const tasks = board[col.id] || [];
    totalTasks += tasks.length;
    if (col.id === 'running') running = tasks.length;
    if (col.id === 'blocked') blocked = tasks.length;
    if (col.id === 'done')    done    = tasks.length;

    const cards = tasks.map(t => {
      let badges = '';
      if (t.assignee) badges += `<span class="badge badge-assignee">${esc(t.assignee)}</span>`;
      if (t.tenant)   badges += `<span class="badge badge-tenant">${esc(t.tenant)}</span>`;
      if (t.failures > 0) badges += `<span class="badge badge-failures">${t.failures} fail${t.failures > 1 ? 's' : ''}</span>`;

      const summary = t.summary
        ? `<div class="summary" title="${esc(t.summary)}">${esc(t.summary)}</div>`
        : (t.result ? `<div class="summary" title="${esc(t.result)}">${esc(t.result)}</div>` : '');

      return `<div class="card status-${esc(col.id)}">
        <div class="title">${esc(t.title)}</div>
        ${summary}
        <div class="meta">${badges}</div>
      </div>`;
    }).join('');

    return `<div class="col ${esc(col.class)}">
      <div class="col-head">
        <span class="label">${esc(col.label)}</span>
        <span class="cnt">${tasks.length}</span>
      </div>
      <div class="col-body">${cards}</div>
    </div>`;
  }).join('');

  // Stats bar
  const pct = totalTasks > 0 ? Math.round(done / totalTasks * 100) : 0;
  statsEl.innerHTML = [
    ['Total', totalTasks, 'var(--blue)'],
    ['Running', running, 'var(--blue)'],
    ['Blocked', blocked, 'var(--red)'],
    ['Done', done, 'var(--green)'],
    ['Complete', pct + '%', 'var(--teal)'],
  ].map(([label, val, color]) =>
    `<div class="stat"><div class="num" style="color:${color}">${val}</div>${label}</div>`
  ).join('');
}

// ── Boot ───────────────────────────────────────────────

if (token) {
  tryToken(token).then(ok => {
    if (ok) { hideGate(); startPolling(); }
    else    { showGate('Stored token is invalid.'); }
  });
} else {
  showGate();
}
</script>
</body>
</html>
